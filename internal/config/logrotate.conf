# /etc/logrotate.d/app
# Canonical log rotation configuration.
# Owner: root:root  Mode: 0644
#
# Uses copytruncate — the service holds /var/log/app/app.log open continuously
# and must NOT reopen it on any signal (SIGHUP reload is explicitly not supported).
# copytruncate copies the current log to the rotated file, then truncates the
# original in place. The service's file descriptor remains valid and continues
# writing to the same inode.
#
# CRITICAL: copytruncate leaves the service's write offset at the end of the
# pre-truncation file. The next write appends correctly because the service
# opens the log with O_APPEND (enforced by the logging package).
# If the service opened WITHOUT O_APPEND, the write offset would be past the
# new end-of-file, producing null bytes. See service/logging/logging.go.
#
# Conforms to Application Runtime Contract §6.2.

/var/log/app/app.log {
    # Rotate daily.
    daily

    # Keep 7 rotated files.
    rotate 7

    # Do not error if log file is missing (e.g., before first startup).
    missingok

    # Do not rotate empty files.
    notifempty

    # Compress rotated files (gzip).
    compress

    # Delay compression one cycle so the previous rotation can complete.
    delaycompress

    # Use copytruncate: copy the log, then truncate the original in place.
    # The service must NOT reopen the log file on SIGHUP.
    # Do NOT use postrotate/endscript with kill -HUP — this would break the service.
    copytruncate

    # Touch a timestamp file after rotation.
    # Operational monitoring may use this to detect stale rotation.
    # chmod ensures the file is world-readable regardless of root's umask.
    # /var/log/app/ must be mode 0755 for this to be traversable by non-root.
    #
    # Note: this file is created by provisioning bootstrap, not by R2 reset.
    # The bootstrap script must also install this file to /etc/logrotate.d/app
    # and ensure the systemd logrotate timer is active. Without the timer,
    # logs will never rotate, /var/log/app will fill the 50 MiB mount, and
    # subsequent service faults (writes to /var/log/app/app.log) will fail
    # unpredictably.
    lastaction
        touch /var/log/app/.last_rotate
        chmod 0644 /var/log/app/.last_rotate
    endscript
}