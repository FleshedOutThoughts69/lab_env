# /etc/nginx/sites-enabled/app
# Canonical nginx reverse proxy configuration.
# Owner: root:root  Mode: 0644
#
# This file is the R2 reset restore target.
#
# Fault F-007 changes the upstream server address to 9090 — E-series checks fail.
# The upstream block is the single change point: one edit breaks all proxy blocks.
# Fault F-015 appends an invalid directive — F-005 (nginx -t) check fails.
#
# Conforms to canonical-environment.md §4.3.

# Named upstream block.
# F-007 Apply replaces "server 127.0.0.1:8080" with "server 127.0.0.1:9090" here.
# Using a single upstream block means F-007 breaks all proxy blocks with one edit,
# and there is no risk of partial fault application (one block changed, one not).
upstream app_backend {
    server 127.0.0.1:8080;
}

# HTTP → HTTPS redirect (app.local)
server {
    listen 0.0.0.0:80;
    server_name app.local;

    return 301 https://$host$request_uri;
}

# HTTPS termination and upstream proxy (app.local)
server {
    listen 0.0.0.0:443 ssl;
    server_name app.local;

    # TLS configuration.
    # Certificate is self-signed; E-005 uses -k (skip verify).
    ssl_certificate     /etc/nginx/tls/app.local.crt;
    ssl_certificate_key /etc/nginx/tls/app.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://app_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # E-004 conformance check: response must include X-Proxy: nginx.
        # This header is added here — the service does NOT set it.
        add_header         X-Proxy nginx always;

        # Timeout: shorter than the service's /slow endpoint (5s).
        # F-011 baseline behavior: GET /slow via nginx returns 504;
        # direct access to 127.0.0.1:8080/slow returns 200 after 5s.
        proxy_read_timeout    3s;
        proxy_send_timeout    3s;
        proxy_connect_timeout 2s;
        proxy_buffering       off;
    }
}

# HTTP (non-TLS) for conformance checks P-003, E-001, E-002, E-003, E-004.
# These checks use http://localhost which reaches this server block.
#
# Server block selection: nginx matches server_name exactly before falling back
# to the default. A request with "Host: localhost" matches this block's
# server_name localhost exactly, taking priority over server_name app.local.
# default_server makes explicit what handles requests with no Host header.
server {
    listen 127.0.0.1:80 default_server;
    server_name localhost;

    location / {
        proxy_pass         http://app_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # E-004 conformance check.
        add_header         X-Proxy nginx always;

        proxy_read_timeout    3s;
        proxy_send_timeout    3s;
        proxy_connect_timeout 2s;
        proxy_buffering       off;
    }
}